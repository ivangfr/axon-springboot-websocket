<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food-Ordering-Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<nav class="fixed top-0 left-0 right-0 z-40 bg-gray-900 border-b border-gray-800 shadow-lg">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
        <div class="flex items-center justify-between h-14">
            <a th:href="@{/}" class="text-white font-bold text-lg tracking-wide">Food-Ordering-Service</a>
            <div class="flex items-center gap-3">
                <span class="flex items-center gap-2 connWebSocket cursor-pointer">
                    <span id="wsStatusDot" class="w-2 h-2 rounded-full bg-green-500 inline-block"></span>
                    <span id="wsStatusText" class="text-green-400 text-xs font-semibold tracking-wider uppercase">Connected</span>
                </span>
            </div>
        </div>
    </div>
</nav>

<div class="h-14"></div>

<main class="max-w-6xl mx-auto px-4 sm:px-6 py-6">

    <!-- Tabs -->
    <div class="flex border-b border-gray-200 mb-6">
        <button class="tab-item active px-4 py-2.5 text-sm font-medium border-b-2 border-teal-500 text-teal-600 -mb-px transition-colors"
                data-tab-panel="placeOrderPanel">Place an Order</button>
        <button class="tab-item px-4 py-2.5 text-sm font-medium text-gray-500 border-b-2 border-transparent -mb-px hover:text-gray-700 transition-colors"
                data-tab-panel="checkOrderPanel">Check Orders</button>
    </div>

    <!-- Place an Order Tab -->
    <div id="placeOrderPanel" class="tab-panel">
        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-3">
                <div id="customerDropdown" class="relative">
                    <button type="button" class="dropdown-toggle w-full flex items-center justify-between px-4 py-2.5 bg-white border border-gray-300 rounded-lg text-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-teal-500">
                        <span class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                            <span class="dropdown-text text-gray-500">Select Customer</span>
                        </span>
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div class="dropdown-menu absolute z-10 mt-1 w-full bg-white border border-gray-200 rounded-lg shadow-lg hidden max-h-60 overflow-y-auto"></div>
                    <input type="hidden" class="dropdown-value">
                </div>
            </div>
            <div class="col-span-9">
                <div id="restaurantAccordion" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- Check Orders Tab -->
    <div id="checkOrderPanel" class="tab-panel hidden">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
            <table id="orderTable" class="w-full text-sm border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-200">
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Customer Name</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Customer Address</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Restaurant Name</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                        <th class="text-right px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Total</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">CreatedAt</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Items</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>
</main>

<!-- Alert Modal -->
<div id="alertModal" class="fixed inset-0 z-50 hidden flex items-center justify-center">
    <div class="fixed inset-0 bg-black/50 modal-backdrop"></div>
    <div class="relative bg-white rounded-xl shadow-2xl max-w-md w-full mx-4 p-6">
        <h3 class="modal-header text-lg font-semibold text-gray-900"></h3>
        <p class="modal-content mt-2 text-gray-600"></p>
        <div class="flex justify-end mt-6">
            <button class="modal-ok px-4 py-2 text-sm font-medium text-white bg-teal-500 hover:bg-teal-600 rounded-lg transition-colors">Ok</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.3.0/bundles/stomp.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.18/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/accounting@0.4.1/accounting.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
