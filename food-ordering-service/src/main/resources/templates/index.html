<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food-Ordering-Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<nav class="fixed top-0 left-0 right-0 z-40 bg-gray-900 border-b border-gray-800 shadow-lg">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
        <div class="flex items-center justify-between h-14">
            <a th:href="@{/}" class="text-white font-bold text-lg tracking-wide">Food-Ordering-Service</a>
            <div class="flex items-center gap-3">
                <span class="flex items-center gap-2 connWebSocket cursor-pointer">
                    <span id="wsStatusDot" class="w-2 h-2 rounded-full bg-green-500 inline-block"></span>
                    <span id="wsStatusText" class="text-green-400 text-xs font-semibold tracking-wider uppercase">Connected</span>
                </span>
            </div>
        </div>
    </div>
</nav>

<div class="h-14"></div>

<main class="max-w-6xl mx-auto px-4 sm:px-6 py-6">

    <!-- Tabs -->
    <div class="flex border-b border-gray-200 mb-6">
        <button class="tab-item active px-4 py-2.5 text-sm font-medium border-b-2 border-teal-500 text-teal-600 -mb-px transition-colors"
                data-tab-panel="placeOrderPanel">Place an Order</button>
        <button class="tab-item px-4 py-2.5 text-sm font-medium text-gray-500 border-b-2 border-transparent -mb-px hover:text-gray-700 transition-colors"
                data-tab-panel="checkOrderPanel">Check Orders</button>
    </div>

    <!-- Place an Order Tab -->
    <div id="placeOrderPanel" class="tab-panel">
        <div class="max-w-2xl mx-auto mb-8">
            <!-- Step Indicator -->
            <div class="flex items-center justify-center mb-1">
                <div class="flex items-center">
                    <div class="step-circle flex items-center justify-center w-8 h-8 rounded-full bg-teal-500 text-white text-sm font-bold" data-step="1">
                        <span class="step-number">1</span>
                        <svg class="step-check hidden w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                    </div>
                </div>
                <div class="step-line w-12 h-0.5 bg-gray-300" data-from="1" data-to="2"></div>
                <div class="flex items-center">
                    <div class="step-circle flex items-center justify-center w-8 h-8 rounded-full bg-gray-200 text-gray-500 text-sm font-bold" data-step="2">
                        <span class="step-number">2</span>
                        <svg class="step-check hidden w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                    </div>
                </div>
                <div class="step-line w-12 h-0.5 bg-gray-300" data-from="2" data-to="3"></div>
                <div class="flex items-center">
                    <div class="step-circle flex items-center justify-center w-8 h-8 rounded-full bg-gray-200 text-gray-500 text-sm font-bold" data-step="3">
                        <span class="step-number">3</span>
                        <svg class="step-check hidden w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                    </div>
                </div>
                <div class="step-line w-12 h-0.5 bg-gray-300" data-from="3" data-to="4"></div>
                <div class="flex items-center">
                    <div class="step-circle flex items-center justify-center w-8 h-8 rounded-full bg-gray-200 text-gray-500 text-sm font-bold" data-step="4">
                        <span class="step-number">4</span>
                        <svg class="step-check hidden w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                    </div>
                </div>
            </div>
            <div class="flex justify-center gap-10 text-xs font-medium">
                <span class="step-label text-teal-600" data-step="1">Customer</span>
                <span class="step-label text-gray-400" data-step="2">Restaurant</span>
                <span class="step-label text-gray-400" data-step="3">Dishes</span>
                <span class="step-label text-gray-400" data-step="4">Review</span>
            </div>
        </div>

        <!-- Step 1: Customer -->
        <div id="step1Content" class="step-content max-w-md mx-auto">
            <h2 class="text-lg font-semibold text-gray-900 mb-4">Select Customer</h2>
            <div id="customerDropdown" class="relative">
                <button type="button" class="dropdown-toggle w-full flex items-center justify-between px-4 py-2.5 bg-white border border-gray-300 rounded-lg text-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-teal-500">
                    <span class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        <span class="dropdown-text text-gray-500">Select Customer</span>
                    </span>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div class="dropdown-menu absolute z-10 mt-1 w-full bg-white border border-gray-200 rounded-lg shadow-lg hidden max-h-60 overflow-y-auto"></div>
                <input type="hidden" class="dropdown-value">
            </div>
            <div class="flex justify-end mt-6">
                <button id="step1Next" class="px-6 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-lg text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>Next →</button>
            </div>
        </div>

        <!-- Step 2: Restaurant -->
        <div id="step2Content" class="step-content max-w-lg mx-auto hidden">
            <h2 class="text-lg font-semibold text-gray-900 mb-4">Select Restaurant</h2>
            <div id="restaurantList" class="space-y-2"></div>
            <div class="flex justify-between mt-6">
                <button id="step2Back" class="px-6 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-medium transition-colors">← Back</button>
                <button id="step2Next" class="px-6 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-lg text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>Next →</button>
            </div>
        </div>

        <!-- Step 3: Dishes -->
        <div id="step3Content" class="step-content max-w-lg mx-auto hidden">
            <h2 class="text-lg font-semibold text-gray-900 mb-1">Choose Dishes</h2>
            <p class="text-sm text-gray-500 mb-4">Restaurant: <strong id="step3RestaurantName"></strong></p>
            <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
                <table class="w-full text-sm border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <th class="w-10 px-2 py-2"></th>
                            <th class="text-left px-2 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Dish</th>
                            <th class="text-left px-2 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Price</th>
                            <th class="text-left px-2 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Qty</th>
                            <th class="w-10 px-2 py-2"></th>
                        </tr>
                    </thead>
                    <tbody id="dishTableBody"></tbody>
                    <tfoot>
                        <tr class="border-t border-gray-200">
                            <td colspan="3" class="px-2 py-2"></td>
                            <td id="step3Total" class="text-right font-semibold text-teal-600 px-2 py-2"></td>
                            <td class="px-2 py-2"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
            <div class="flex justify-between mt-6">
                <button id="step3Back" class="px-6 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-medium transition-colors">← Back</button>
                <button id="step3Next" class="px-6 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-lg text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>Next →</button>
            </div>
        </div>

        <!-- Step 4: Review -->
        <div id="step4Content" class="step-content max-w-lg mx-auto hidden">
            <h2 class="text-lg font-semibold text-gray-900 mb-4">Review Your Order</h2>
            <div class="bg-white rounded-xl border border-gray-200 p-4 space-y-3">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Customer</span>
                    <span class="font-medium" id="reviewCustomer"></span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Restaurant</span>
                    <span class="font-medium" id="reviewRestaurant"></span>
                </div>
                <hr class="border-gray-200">
                <div>
                    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Items</span>
                    <ul id="reviewItems" class="mt-2 space-y-1"></ul>
                </div>
                <hr class="border-gray-200">
                <div class="flex justify-between text-sm font-semibold">
                    <span>Total</span>
                    <span class="text-teal-600" id="reviewTotal"></span>
                </div>
            </div>
            <div class="flex justify-between mt-6">
                <button id="step4Back" class="px-6 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-medium transition-colors">← Back</button>
                <button id="btnPlaceOrder" class="px-6 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-lg text-sm font-medium transition-colors">Place Order</button>
            </div>
        </div>
    </div>

    <!-- Check Orders Tab -->
    <div id="checkOrderPanel" class="tab-panel hidden">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
            <table id="orderTable" class="w-full text-sm border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-200">
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Customer Name</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Customer Address</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Restaurant Name</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                        <th class="text-right px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Total</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">CreatedAt</th>
                        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Items</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>
</main>

<!-- Alert Modal -->
<div id="alertModal" class="fixed inset-0 z-50 hidden flex items-center justify-center">
    <div class="fixed inset-0 bg-black/50 modal-backdrop"></div>
    <div class="relative bg-white rounded-xl shadow-2xl max-w-md w-full mx-4 p-6">
        <h3 class="modal-header text-lg font-semibold text-gray-900"></h3>
        <p class="modal-content mt-2 text-gray-600"></p>
        <div class="flex justify-end mt-6">
            <button class="modal-ok px-4 py-2 text-sm font-medium text-white bg-teal-500 hover:bg-teal-600 rounded-lg transition-colors">Ok</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.3.0/bundles/stomp.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.18/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/accounting@0.4.1/accounting.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
